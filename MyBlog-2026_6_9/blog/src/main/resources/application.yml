server:
  port: 7777

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: root
    password: your_password_here
  servlet:
    multipart:
        max-file-size: 2MB
        max-request-size: 5MB
  redis:
    host: localhost
    port: 6379

qiniu:
  accessKey: your_qiniu_access_key
  secretKey: your_qiniu_secret_key
  bucket: ptu-blog-test
  domain: http://localhost:7777

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto